name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # تم التحديث لـ v4

      - name: Set up Python
        uses: actions/setup-python@v5 # تم التحديث لـ v5
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # إذا لم يكن الملف موجوداً، سيقوم بإنشائه
          if [ ! -f buildozer.spec ]; then buildozer init; fi
          # بناء التطبيق
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # هذا هو الإصلاح الأهم (v4)
        with:
          name: my-game-app
          path: bin/*.apk
